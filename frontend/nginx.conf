server {
  listen 80;
  server_name _;
  client_max_body_size 10M;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Service worker — must always be fresh so browsers pick up new versions.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # SW registration helper — fresh on every request.
  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # push-sw.js is importScripts'd by sw.js; must match the active SW version.
  location = /push-sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Web app manifest — never cache so icon/name updates are picked up.
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Hashed JS/CSS chunks — immutable, cache forever.
  # Vite names these assets/xxx-<hash>.js / .css so content changes = new URL.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # API proxy
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Uploaded user/team/org images live in the backend volume, not in the SPA
  # image directory. ^~ prevents the generic image regex from intercepting
  # /uploads/*.png|jpg|webp and returning a frontend 404.
  location ^~ /uploads/ {
    proxy_pass http://backend:3000/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Static images and fonts that have no hash can have a short cache.
  location ~* \.(png|svg|ico|webp|jpg|jpeg|gif|woff|woff2|ttf|eot)$ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # SPA fallback — index.html must never be cached so browsers always get
  # the latest version pointing to the new hashed JS/CSS chunks.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri $uri/ /index.html;
  }
}
